#!/usr/bin/nft -f

###############################################
#                                             #
# VATFERWARE 3.0 - 2IF                        #
#                                             #
# Script de firewalling nftables              #
###############################################

##### Synopsis d'application de ce script ##################################
#                                  __________                              #
#            ( ------)            |          |           (-------)         #
#           (   NET   )<--------->| FIREWALL |<-------->(   LAN   )        #
#            (-------)            |__________|           (-------)         #
#                                                                          #
############################################################################


#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Definition des interfaces locales
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define IF_WAN = enp6s18
define IF_LAN = enp6s19

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Definition des adresses des interfaces locales
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define IP_WAN = 192.168.10.31
define IP_LAN = 172.16.0.1

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Definition des reseaux locaux
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define LAN = 172.16.0.0/16

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Traffic Autorisé depuis la loopback (tcp et udp)
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define Out_LO = { 0-65535 }

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Traffic Autorisé du Firewall vers le Net
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define Fw_to_Net_Tcp = { http, https, ftp, ssh, domain, 465 }
define Fw_to_Net_Udp = { domain, ntp }

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Traffic Autorisé du Firewall vers le Lan
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define Fw_to_Lan_Tcp = { domain }
define Fw_to_Lan_Udp = { domain, 67-68 }

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Traffic Autorisé du Lan vers le Firewall
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define Lan_to_Fw_Tcp = { ssh, domain }
define Lan_to_Fw_Udp = { domain, 67-68 }

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Traffic Autorisé du Lan vers le Net
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define Lan_to_Net_Tcp = { http, https, ssh, domain, smtp, pop3, imap, 587, 465 }
define Lan_to_Net_Udp = { domain, ntp, 500, 4500 }

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Traffic Autorisé du Net vers le Firewall
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define Net_to_Fw_Tcp = { ssh }
define Net_to_Fw_Udp = { }

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Traffic Autorisé du Net vers le Lan
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
define Net_to_Lan_Tcp = { 443 }
define Net_to_Lan_Udp = { }

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Redirection du Net vers le Lan
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Voir ligne 285

########################################################


### Suppression des règles existantes
flush ruleset

### Table principale ip filter
table ip filter {
    # Sets pour les ports autorisés
    # Sortie de la loopback
    set output_lo {
        type inet_service
        flags interval
        elements = $Out_LO
    }

    # Firewall vers le Net
    set fw_net_tcp_ports {
        type inet_service
        flags interval
        elements = $Fw_to_Net_Tcp
    }
    set fw_net_udp_ports {
        type inet_service
        flags interval
        elements = $Fw_to_Net_Udp
    }

    # Firewall vers le Lan
    set fw_lan_tcp_ports {
        type inet_service
        flags interval
        elements = $Fw_to_Lan_Tcp
    }
    set fw_lan_udp_ports {
        type inet_service
        flags interval
        elements = $Fw_to_Lan_Udp
    }

    # Lan vers le Firewall
    set lan_fw_tcp_ports {
        type inet_service
        flags interval
        elements = $Lan_to_Fw_Tcp
    }
    set lan_fw_udp_ports {
        type inet_service
        flags interval
        elements = $Lan_to_Fw_Udp
    }

    # Lan vers le Net
    set lan_net_tcp_ports {
        type inet_service
        flags interval
        elements = $Lan_to_Net_Tcp
    }
    set lan_net_udp_ports {
        type inet_service
        flags interval
        elements = $Lan_to_Net_Udp
    }

    # Net vers le Firewall
    set net_fw_tcp_ports {
        type inet_service
        flags interval
        elements = $Net_to_Fw_Tcp
    }
    set net_fw_udp_ports {
        type inet_service
        flags interval
        elements = $Net_to_Fw_Udp
    }

    # Net vers le Lan
    set net_lan_tcp_ports {
        type inet_service
        flags interval
        elements = $Net_to_Lan_Tcp
    }
    set net_lan_udp_ports {
        type inet_service
        flags interval
        elements = $Net_to_Lan_Udp
    }

    # SSH brute-force protection
    set ssh_conntrack {
        type ipv4_addr
        size 65535
        timeout 1h
        flags dynamic
    }

    # Helper FTP pour le suivi des connexions de données (PASV/PORT)
    # Nécessite le module noyau nf_conntrack_ftp
    ct helper ftp-standard {
        type "ftp" protocol tcp
    }


    ### Chaîne globale pour les règles communes
    chain global {
        # Autoriser les connexions établies et relatives
        ct state established,related accept

        # Rejeter les connexions invalides
        ct state invalid drop

        # Protection SYN flood (drop uniquement les SYN excessifs)
        ip protocol tcp tcp flags & (fin|syn|rst|ack) == syn limit rate over 50/second drop

        # Autoriser les types ICMP essentiels (PMTUD, diagnostics)
        ip protocol icmp icmp type { destination-unreachable, time-exceeded, parameter-problem } accept

        # Limiter les echo-request (ping)
        ip protocol icmp icmp type echo-request limit rate 1/second accept

        # Interface loopback
        iifname "lo" accept
    }

    ### Chaîne INPUT (trafic vers le firewall)
    chain input {
        type filter hook input priority filter; policy drop;

        # Appliquer les règles globales
        jump global

        # Trafic du LAN vers le firewall
        iifname $IF_LAN ip saddr $LAN tcp dport @lan_fw_tcp_ports accept
        iifname $IF_LAN ip saddr $LAN udp dport @lan_fw_udp_ports accept

        # Trafic du NET vers le firewall
        # Protection SSH brute-force
        #iifname $IF_WAN tcp dport ssh ct state new add @ssh_conntrack { ip saddr limit rate 3/minute } accept
        iifname $IF_WAN tcp dport @net_fw_tcp_ports accept
        iifname $IF_WAN udp dport @net_fw_udp_ports accept

        # Log et drop des autres paquets avec details
        limit rate 1/second log prefix "[nftables INPUT-drop] : " counter
        drop
    }

    # Chaîne OUTPUT (trafic depuis le firewall)
    chain output {
        type filter hook output priority filter; policy drop;

        # Appliquer les règles globales
        jump global

        # Trafic depuis la loopback
        oifname "lo" th dport @output_lo accept

        # Trafic du firewall vers le NET
        #oifname $IF_WAN tcp dport 21 ct helper set "ftp-standard"
        oifname $IF_WAN tcp dport @fw_net_tcp_ports accept
        oifname $IF_WAN udp dport @fw_net_udp_ports accept

        # Trafic du firewall vers le LAN
        oifname $IF_LAN tcp dport @fw_lan_tcp_ports accept
        oifname $IF_LAN udp dport @fw_lan_udp_ports accept

        # Log et drop des autres paquets avec details
        limit rate 1/second log prefix "[nftables OUTPUT-drop] : " counter
        drop
    }

    # Chaîne FORWARD (trafic transitant par le firewall)
    chain forward {
        type filter hook forward priority filter; policy drop;

        # Appliquer les règles globales
        jump global

        # Trafic du LAN vers NET
        iifname $IF_LAN oifname $IF_WAN ip saddr $LAN tcp dport @lan_net_tcp_ports accept
        iifname $IF_LAN oifname $IF_WAN ip saddr $LAN udp dport @lan_net_udp_ports accept

        # Trafic du NET vers LAN
        iifname $IF_WAN oifname $IF_LAN tcp dport @net_lan_tcp_ports accept
        iifname $IF_WAN oifname $IF_LAN udp dport @net_lan_udp_ports accept

        # Log et drop des autres paquets avec détails
        limit rate 1/second log prefix "[nftables FORWARD-drop] : " counter
        drop
    }
}

# Table NAT pour la traduction d'adresses
table ip nat {

    # Chaîne PREROUTING pour les redirections
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;

        # Redirections de ports vers le LAN
        ip daddr $IP_WAN tcp dport 443 dnat to 172.16.2.11:443

    }

    # Chaîne POSTROUTING pour le masquerading
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # NAT pour le LAN
        ip saddr $LAN oifname $IF_WAN masquerade

    }
}
